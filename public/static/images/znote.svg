<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- 笔记本封面蓝色渐变 -->
    <linearGradient id="coverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    
    <!-- 笔记本侧边书脊渐变 -->
    <linearGradient id="spineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>

    <!-- 柔和的阴影效果 -->
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1d4ed8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 书脊 (Spine) -->
  <rect x="40" y="30" width="20" height="140" rx="6" fill="url(#spineGradient)" />
  
  <!-- 笔记本封面 (Cover) -->
  <rect x="55" y="30" width="115" height="140" rx="10" fill="url(#coverGradient)" filter="url(#softShadow)" />
  
  <!-- 封面内发光/高光边缘，增加现代质感 -->
  <rect x="57" y="32" width="111" height="136" rx="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3" />

  <!-- 书签带 (Bookmark Ribbon)，采用互补的琥珀色作为点缀 -->
  <path d="M 145 170 V 182 L 148.5 178 L 152 182 V 170 Z" fill="#fbbf24" />

  <!-- 线圈装订孔 (Binding Rings) -->
  <g fill="#e0e7ff" opacity="0.95">
    <rect x="35" y="50" width="25" height="6" rx="3" />
    <rect x="35" y="75" width="25" height="6" rx="3" />
    <rect x="35" y="100" width="25" height="6" rx="3" />
    <rect x="35" y="125" width="25" height="6" rx="3" />
    <rect x="35" y="150" width="25" height="6" rx="3" />
  </g>

  <!-- 字母 Z 的底部阴影 -->
  <path d="M 88 77 H 128 L 98 127 H 138" fill="none" stroke="#1e3a8a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.2" />
  
  <!-- 居中的字母 Z (Letter Z) -->
  <path d="M 88 75 H 128 L 98 125 H 138" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
</svg>